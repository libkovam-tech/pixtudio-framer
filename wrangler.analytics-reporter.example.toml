name = "pixtudio-analytics-reporter"
main = "workers/pixtudio-analytics-reporter.ts"
compatibility_date = "2026-04-19"
workers_dev = false
preview_urls = false

# Cloudflare Cron uses UTC.
# This runs on the first day of every month at 06:00 UTC.
[triggers]
crons = ["0 6 1 * *"]

[[d1_databases]]
binding = "ANALYTICS_DB"
database_name = "pixtudio-analytics"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[send_email]]
name = "REPORT_EMAIL"
allowed_sender_addresses = ["analytics@pixtudio.app"]

[vars]
ANALYTICS_REPORT_SENDER = "analytics@pixtudio.app"
ANALYTICS_REPORT_RECIPIENT = "REPLACE_WITH_YOUR_EMAIL"
